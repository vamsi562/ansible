- name: Multipackage install using loops
  hosts: local
  connection: local
  become: yes
  tasks:
  - name: Installing Packages
    ansible.builtin.dnf:
      name: "{{ item.name }}"
      state: "{{ item.sate }}"
    loop:
    - { name: nginx, state: latest }
    - { name: zip, state: latest }
    - { name: jq, state: absent }
    - { name: docker, state: absent }
